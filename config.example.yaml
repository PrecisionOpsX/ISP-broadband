# Copy to config.yaml and edit. Running without a config file uses these defaults.

headless: true
db_path: data/serviceability.db
request_timeout_seconds: 30

# Residential or rotating proxies. One warmed browser identity is bound to each.
# Leave empty for a direct connection (fine for a small local test, not for scale).
proxies: []
#  - http://user:pass@host:port
#  - http://user:pass@host2:port

# Conservative pacing. Relax for speed once proxies are in place, tighten if blocked.
pacing:
  min_delay_seconds: 4.0
  max_delay_seconds: 9.0
  max_retries: 4
  backoff_base_seconds: 5.0
  backoff_cap_seconds: 90.0

# Commercial unblocker for the heavily defended providers (AT&T Akamai, Frontier
# Verizon WAF). Leave enabled false until you have a key. Two shapes:
#   proxy        - a Web Unlocker proxy string (single-request targets, e.g. AT&T)
#   cdp_endpoint - a Scraping Browser websocket (interactive flows, e.g. Frontier)
# Set whichever your provider gives you; cdp_endpoint takes precedence when both
# are present. The AT&T and Frontier checkers route through this automatically.
unblocker:
  enabled: false
  provider: brightdata
  proxy: ""          # e.g. http://brd-customer-XXXX-zone-unlocker:PASS@brd.superproxy.io:33335
  cdp_endpoint: ""   # e.g. wss://brd-customer-XXXX-zone-scraping_browser:PASS@brd.superproxy.io:9222
